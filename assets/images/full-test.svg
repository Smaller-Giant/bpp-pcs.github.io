  <text x="800" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="700" fill="#f7f9ff" letter-spacing="8">FULL TEST</text>
  <text x="800" y="575" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="600" fill="#9ac1ff" letter-spacing="4">TEST PRODUCT IMAGE</text>
