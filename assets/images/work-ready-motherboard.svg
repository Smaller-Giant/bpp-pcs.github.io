<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Work Ready motherboard details</title>
  <desc id="desc">Motherboard and platform stability overview for the Work Ready PC.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#354565"/>
    </linearGradient>
    <clipPath id="textClip">
      <rect x="140" y="380" width="835" height="320" rx="14"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="48" y="42" width="1504" height="816" rx="34" fill="#0d162a" fill-opacity="0.80" stroke="#dce9ff" stroke-opacity="0.22"/>

  <text x="122" y="188" fill="#f5f9ff" font-family="Segoe UI, Arial, sans-serif" font-size="94" font-weight="700" letter-spacing="7">BOARD STABILITY</text>
  <text x="122" y="256" fill="#d5e3ff" font-family="Segoe UI, Arial, sans-serif" font-size="40" letter-spacing="4">ASROCK H470M-HVS PLATFORM</text>

  <rect x="112" y="296" width="852" height="498" rx="24" fill="#12233f" stroke="#dce9ff" stroke-opacity="0.18"/>
  <text x="150" y="356" fill="#bcd8ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="2">PART HIGHLIGHTS</text>

  <g clip-path="url(#textClip)">
    <text x="150" y="422" fill="#eef4ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">ASRock H470M-HVS board matched to the Intel i3</text>
    <text x="150" y="478" fill="#eef4ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Dual-channel DDR4 support improves responsiveness</text>
    <text x="150" y="534" fill="#eef4ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Stable I/O and power delivery for long office sessions</text>
    <text x="150" y="590" fill="#eef4ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Reliable base platform with practical upgrade room</text>
    <text x="150" y="646" fill="#eef4ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Built for consistent day-to-day business workloads</text>
  </g>

  <g transform="translate(1002 154)">
    <rect x="0" y="0" width="472" height="590" rx="30" fill="#0a111f" stroke="#e3edff" stroke-opacity="0.24"/>
    <rect x="62" y="58" width="348" height="348" rx="22" fill="#162a4b" stroke="#e3edff" stroke-opacity="0.22"/>
    <rect x="120" y="114" width="126" height="126" rx="16" fill="#0d1e35" stroke="#9bc4ff" stroke-opacity="0.80"/>
    <rect x="274" y="114" width="92" height="226" rx="14" fill="#0f233f" stroke="#dce9ff" stroke-opacity="0.30"/>
    <rect x="120" y="264" width="126" height="76" rx="12" fill="#0f233f"/>
    <path d="M62 232h348" stroke="#95bfff" stroke-opacity="0.40"/>
    <path d="M236 58v348" stroke="#95bfff" stroke-opacity="0.30"/>
  </g>
</svg>
