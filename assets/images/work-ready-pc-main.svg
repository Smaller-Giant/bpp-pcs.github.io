<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Work Ready PC main image</title>
  <desc id="desc">A polished render style image of the compact black Work Ready PC case with mesh front and glass side panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05080f"/>
      <stop offset="55%" stop-color="#0a1322"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d6773"/>
      <stop offset="100%" stop-color="#2b313a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#95d8ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4d8eb7" stop-opacity="0.09"/>
    </linearGradient>
    <pattern id="mesh" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#141c28"/>
      <circle cx="4" cy="4" r="1.2" fill="#65717f" fill-opacity="0.68"/>
      <circle cx="12" cy="4" r="1.2" fill="#65717f" fill-opacity="0.68"/>
      <circle cx="4" cy="12" r="1.2" fill="#65717f" fill-opacity="0.68"/>
      <circle cx="12" cy="12" r="1.2" fill="#65717f" fill-opacity="0.68"/>
    </pattern>
    <linearGradient id="frontShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111722" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <g stroke="#1f2c3f" stroke-width="2" opacity="0.7">
    <line x1="0" y1="980" x2="1600" y2="980"/>
    <line x1="0" y1="860" x2="1600" y2="860"/>
    <line x1="0" y1="740" x2="1600" y2="740"/>
    <line x1="160" y1="1200" x2="470" y2="690"/>
    <line x1="420" y1="1200" x2="640" y2="650"/>
    <line x1="780" y1="1200" x2="840" y2="630"/>
    <line x1="1160" y1="1200" x2="1060" y2="650"/>
    <line x1="1440" y1="1200" x2="1220" y2="700"/>
  </g>

  <g filter="url(#softGlow)" opacity="0.35">
    <ellipse cx="810" cy="850" rx="410" ry="140" fill="#6ecfff"/>
  </g>
  <ellipse cx="810" cy="885" rx="430" ry="95" fill="#02050a" opacity="0.8"/>

  <g>
    <polygon points="525,375 1015,300 1255,445 760,530" fill="url(#metal)" stroke="#7f8a96" stroke-width="2"/>
    <polygon points="430,405 790,550 790,960 430,820" fill="url(#metal)" stroke="#697381" stroke-width="2"/>
    <polygon points="790,550 1255,445 1255,865 790,960" fill="#161d27" stroke="#64707e" stroke-width="2"/>
    <polygon points="445,420 775,555 775,935 445,815" fill="#0f1723" stroke="#5f6b79" stroke-width="2"/>
    <polygon points="805,565 1240,460 1240,850 805,945" fill="url(#mesh)" stroke="#526070" stroke-width="2"/>
    <polygon points="805,565 1240,460 1240,850 805,945" fill="url(#frontShade)"/>
    <polygon points="495,445 748,548 748,892 495,790" fill="url(#glass)" stroke="#7f8da0" stroke-width="2"/>
    <polygon points="545,455 730,530 730,595 545,520" fill="#0f151f" opacity="0.8"/>
    <circle cx="610" cy="690" r="78" fill="#121a27" stroke="#4f5d70" stroke-width="3"/>
    <circle cx="610" cy="690" r="68" fill="none" stroke="#2b3645" stroke-width="16"/>
    <circle cx="610" cy="690" r="28" fill="#202a38"/>
    <g fill="#c6f0ff">
      <circle cx="1110" cy="495" r="8"/>
      <rect x="1140" y="487" width="22" height="14" rx="3"/>
      <rect x="1175" y="487" width="22" height="14" rx="3"/>
      <rect x="1070" y="475" width="20" height="34" rx="3" fill="none" stroke="#c6f0ff" stroke-width="3"/>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#e8f6ff">
    <text x="120" y="120" font-size="42" font-weight="700" letter-spacing="2">BPP PCs</text>
    <text x="120" y="168" font-size="70" font-weight="800">Work Ready PC</text>
    <text x="120" y="220" font-size="32" fill="#87d9ff">Compact mesh case | Professional black finish</text>
  </g>
</svg>
