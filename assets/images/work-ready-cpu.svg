<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Work Ready CPU details</title>
  <desc id="desc">CPU-focused card for the Work Ready PC with practical performance benefits.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1a29"/>
      <stop offset="100%" stop-color="#1f5b74"/>
    </linearGradient>
    <clipPath id="textClip">
      <rect x="140" y="380" width="835" height="280" rx="14"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="48" y="42" width="1504" height="816" rx="34" fill="#0a1222" fill-opacity="0.78" stroke="#d8edff" stroke-opacity="0.22"/>

  <text x="122" y="188" fill="#f4f9ff" font-family="Segoe UI, Arial, sans-serif" font-size="94" font-weight="700" letter-spacing="7">CPU WORKFLOW</text>
  <text x="122" y="256" fill="#cfe7ff" font-family="Segoe UI, Arial, sans-serif" font-size="40" letter-spacing="4">INTEL CORE i3-10105</text>

  <rect x="112" y="296" width="852" height="498" rx="24" fill="#0f1f38" stroke="#d8edff" stroke-opacity="0.18"/>
  <text x="150" y="356" fill="#b8e1ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="2">PART HIGHLIGHTS</text>

  <g clip-path="url(#textClip)">
    <text x="150" y="422" fill="#edf5ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">4 cores / 8 threads with boost up to 4.4GHz</text>
    <text x="150" y="478" fill="#edf5ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Keeps browser tabs, docs, and email responsive</text>
    <text x="150" y="534" fill="#edf5ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Integrated UHD graphics helps reduce heat and power</text>
    <text x="150" y="590" fill="#edf5ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Reliable for office apps and remote-call software</text>
  </g>

  <g transform="translate(1000 156)">
    <rect x="0" y="0" width="474" height="586" rx="30" fill="#09101c" stroke="#e4f1ff" stroke-opacity="0.22"/>
    <rect x="98" y="90" width="278" height="278" rx="22" fill="#132743" stroke="#e4f1ff" stroke-opacity="0.24"/>
    <rect x="130" y="122" width="214" height="214" rx="18" fill="#0f2036"/>
    <path d="M114 230h246" stroke="#8fdcff" stroke-width="5" stroke-opacity="0.78"/>
    <path d="M238 106v248" stroke="#8fdcff" stroke-width="5" stroke-opacity="0.56"/>
    <rect x="108" y="424" width="258" height="94" rx="18" fill="#101a2f" stroke="#e4f1ff" stroke-opacity="0.16"/>
  </g>
</svg>
