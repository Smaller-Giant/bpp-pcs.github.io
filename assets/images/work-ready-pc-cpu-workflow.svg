<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">CPU workflow slide</title>
  <desc id="desc">A product explainer image highlighting Intel Core i3-10105 performance benefits for office workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101d"/>
      <stop offset="100%" stop-color="#111f33"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59d3ff"/>
      <stop offset="100%" stop-color="#1b87b8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a273c"/>
      <stop offset="100%" stop-color="#101a2a"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1260" cy="210" r="260" fill="#59d3ff" opacity="0.12"/>
  <circle cx="280" cy="960" r="230" fill="#59d3ff" opacity="0.1"/>

  <g transform="translate(140 230)">
    <rect x="0" y="0" width="560" height="560" rx="30" fill="#0b1627" stroke="#5fc9ee" stroke-width="6"/>
    <rect x="92" y="92" width="376" height="376" rx="20" fill="url(#chip)"/>
    <rect x="152" y="152" width="256" height="256" rx="18" fill="#0c1b2d"/>
    <text x="280" y="255" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="46" fill="#d9f6ff" font-weight="700">Intel Core i3</text>
    <text x="280" y="315" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="56" fill="#ffffff" font-weight="800">10105</text>
    <text x="280" y="365" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#8fdfff">Up to 4.4 GHz boost</text>
    <g stroke="#6cd7ff" stroke-width="6">
      <line x1="40" y1="80" x2="0" y2="80"/>
      <line x1="40" y1="140" x2="0" y2="140"/>
      <line x1="40" y1="200" x2="0" y2="200"/>
      <line x1="40" y1="260" x2="0" y2="260"/>
      <line x1="40" y1="320" x2="0" y2="320"/>
      <line x1="40" y1="380" x2="0" y2="380"/>
      <line x1="40" y1="440" x2="0" y2="440"/>
      <line x1="40" y1="500" x2="0" y2="500"/>
      <line x1="560" y1="80" x2="600" y2="80"/>
      <line x1="560" y1="140" x2="600" y2="140"/>
      <line x1="560" y1="200" x2="600" y2="200"/>
      <line x1="560" y1="260" x2="600" y2="260"/>
      <line x1="560" y1="320" x2="600" y2="320"/>
      <line x1="560" y1="380" x2="600" y2="380"/>
      <line x1="560" y1="440" x2="600" y2="440"/>
      <line x1="560" y1="500" x2="600" y2="500"/>
    </g>
  </g>

  <g transform="translate(800 190)">
    <text x="0" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="68" fill="#ffffff" font-weight="800">Built for Daily Workflow</text>
    <text x="0" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9adfff">Fast enough for office tasks without overpaying for gaming hardware.</text>

    <g transform="translate(0 120)">
      <rect width="680" height="138" rx="20" fill="url(#card)" stroke="#274666"/>
      <text x="38" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#ddf7ff" font-weight="700">Responsive in browser-heavy work</text>
      <text x="38" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#98ccdf">Smooth tab switching and cloud platform use.</text>
    </g>

    <g transform="translate(0 288)">
      <rect width="680" height="138" rx="20" fill="url(#card)" stroke="#274666"/>
      <text x="38" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#ddf7ff" font-weight="700">Confident spreadsheet performance</text>
      <text x="38" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#98ccdf">Good handling for formulas, reports, and daily admin files.</text>
    </g>

    <g transform="translate(0 456)">
      <rect width="680" height="138" rx="20" fill="url(#card)" stroke="#274666"/>
      <text x="38" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#ddf7ff" font-weight="700">Reliable for calls and communication</text>
      <text x="38" y="98" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#98ccdf">Video meetings, email, docs, and chat all in one session.</text>
    </g>
  </g>
</svg>
