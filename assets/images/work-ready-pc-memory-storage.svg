<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Memory and storage slide</title>
  <desc id="desc">An explainer image covering dual-channel memory and NVMe SSD speed for faster startup and multitasking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071021"/>
      <stop offset="100%" stop-color="#0f1a2b"/>
    </linearGradient>
    <linearGradient id="ramCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f304a"/>
      <stop offset="100%" stop-color="#111e31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#52d2ff"/>
      <stop offset="100%" stop-color="#9ff1ff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#4d6f96" stroke-width="2">
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="900" x2="1600" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="1200"/>
    <line x1="800" y1="0" x2="800" y2="1200"/>
    <line x1="1200" y1="0" x2="1200" y2="1200"/>
  </g>

  <text x="100" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="68" fill="#ffffff" font-weight="800">Faster Startups, Smoother Multitasking</text>
  <text x="100" y="196" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9adfff">Balanced memory and NVMe storage for efficient day-to-day use.</text>

  <g transform="translate(100 280)">
    <rect width="680" height="360" rx="24" fill="url(#ramCard)" stroke="#33537b"/>
    <text x="42" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#e7f9ff" font-weight="700">8GB DDR4 3200 (2x4GB)</text>
    <text x="42" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9fd6ec">Dual-channel configuration for better responsiveness.</text>
    <rect x="42" y="170" width="596" height="68" rx="12" fill="#0f1827" stroke="#4b739f"/>
    <rect x="42" y="256" width="596" height="68" rx="12" fill="#0f1827" stroke="#4b739f"/>
    <text x="70" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#cceeff">Email + browser tabs + documents without constant lag.</text>
    <text x="70" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#cceeff">Better session stability for meetings and web apps.</text>
    <g transform="translate(470 40)">
      <rect width="160" height="90" rx="12" fill="#15253c" stroke="#4ea2c6"/>
      <rect x="16" y="18" width="128" height="54" rx="8" fill="#0c1728"/>
      <text x="80" y="52" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" fill="#73d8ff" font-weight="700">DDR4</text>
    </g>
  </g>

  <g transform="translate(820 280)">
    <rect width="680" height="360" rx="24" fill="url(#ramCard)" stroke="#33537b"/>
    <text x="42" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#e7f9ff" font-weight="700">Patriot P300 NVMe SSD</text>
    <text x="42" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9fd6ec">M.2 PCIe storage for quick boot and app load times.</text>
    <rect x="42" y="170" width="596" height="68" rx="12" fill="#0f1827" stroke="#4b739f"/>
    <rect x="42" y="256" width="596" height="68" rx="12" fill="#0f1827" stroke="#4b739f"/>
    <text x="70" y="214" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#cceeff">Start the PC fast and get into work sooner.</text>
    <text x="70" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#cceeff">Open files and office tools with less waiting.</text>
    <g transform="translate(460 36)">
      <rect width="190" height="96" rx="12" fill="#15253c" stroke="#4ea2c6"/>
      <rect x="20" y="24" width="150" height="48" rx="8" fill="#0c1728"/>
      <text x="95" y="56" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#73d8ff" font-weight="700">M.2 NVMe</text>
    </g>
  </g>

  <g transform="translate(100 710)">
    <rect width="1400" height="290" rx="22" fill="#0d1728" stroke="#35567d"/>
    <text x="50" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#effbff" font-weight="700">Why this matters for business workflows</text>
    <line x1="50" y1="112" x2="1350" y2="112" stroke="url(#accent)" stroke-width="4"/>
    <text x="50" y="172" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#b6dff1">1. Less downtime during startup and login routines.</text>
    <text x="50" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#b6dff1">2. Better flow when moving between admin tools and communications.</text>
    <text x="50" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#b6dff1">3. Responsive feel for routine office productivity tasks.</text>
  </g>
</svg>
