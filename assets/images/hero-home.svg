<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">BPP PCS</title>
  <desc id="desc">BUY  PLUG  PLAY</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#223556"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0f1e" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#121b34" stop-opacity="0.62"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="170" r="260" fill="#99beff" fill-opacity="0.20" filter="url(#softGlow)"/>
  <circle cx="1260" cy="750" r="190" fill="#99beff" fill-opacity="0.14"/>

  <rect x="100" y="90" width="1400" height="720" rx="36" fill="url(#panel)" stroke="#d6e3ff" stroke-opacity="0.22" stroke-width="2"/>

  <g transform="translate(1040 200)">
    <rect x="0" y="0" width="360" height="500" rx="28" fill="#090d18" stroke="#e3edff" stroke-opacity="0.22"/>
    <rect x="36" y="48" width="288" height="264" rx="20" fill="#121d37" stroke="#e3edff" stroke-opacity="0.22"/>
    <rect x="68" y="352" width="224" height="72" rx="16" fill="#10182d" stroke="#e3edff" stroke-opacity="0.18"/>
    <circle cx="120" cy="388" r="10" fill="#99beff"/>
    <circle cx="160" cy="388" r="10" fill="#99beff" fill-opacity="0.72"/>
    <circle cx="200" cy="388" r="10" fill="#99beff" fill-opacity="0.46"/>
  </g>

  <text x="190" y="330" fill="#f6f9ff" font-family="Segoe UI, Arial, sans-serif" font-size="98" font-weight="700" letter-spacing="7">BPP PCS</text>
  <text x="190" y="425" fill="#d3ddf7" font-family="Segoe UI, Arial, sans-serif" font-size="42" letter-spacing="5">BUY  PLUG  PLAY</text>
</svg>
