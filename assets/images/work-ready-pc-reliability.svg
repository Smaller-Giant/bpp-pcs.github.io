<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Reliability and cooling slide</title>
  <desc id="desc">An explainer image highlighting airflow, power supply quality, and stable operation for long business sessions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101f"/>
      <stop offset="100%" stop-color="#0b1728"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2b42"/>
      <stop offset="100%" stop-color="#111c2e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#56d9ff"/>
      <stop offset="100%" stop-color="#d0fbff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1380" cy="180" r="220" fill="#5cd9ff" opacity="0.12"/>
  <circle cx="180" cy="1020" r="240" fill="#5cd9ff" opacity="0.1"/>

  <text x="100" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="68" fill="#ffffff" font-weight="800">Built for Stable All-Day Use</text>
  <text x="100" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9adfff">Airflow-focused case design and dependable power delivery.</text>

  <g transform="translate(110 250)">
    <rect width="700" height="760" rx="26" fill="url(#panel)" stroke="#37577d"/>
    <text x="40" y="72" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#e4f8ff" font-weight="700">ASUS AP201 Mesh Airflow</text>
    <text x="40" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#9fd6eb">Ventilated front and top panels help keep temperatures controlled.</text>

    <rect x="70" y="170" width="300" height="520" rx="16" fill="#111a27" stroke="#6b7b8d"/>
    <rect x="90" y="190" width="260" height="480" rx="12" fill="#171f2d" stroke="#8193a7"/>
    <rect x="220" y="238" width="80" height="54" rx="8" fill="#0f1623" stroke="#5d6f84"/>
    <circle cx="150" cy="420" r="60" fill="none" stroke="#4f6277" stroke-width="14"/>
    <circle cx="150" cy="420" r="24" fill="#28374b"/>
    <rect x="110" y="560" width="200" height="95" rx="12" fill="#0f1623" stroke="#5d6f84"/>

    <g stroke="url(#flow)" stroke-width="12" stroke-linecap="round">
      <line x1="400" y1="280" x2="600" y2="280"/>
      <line x1="400" y1="400" x2="600" y2="400"/>
      <line x1="400" y1="520" x2="600" y2="520"/>
    </g>
    <g fill="#9fefff">
      <polygon points="620,280 590,262 590,298"/>
      <polygon points="620,400 590,382 590,418"/>
      <polygon points="620,520 590,502 590,538"/>
    </g>

    <text x="400" y="650" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#d8f7ff">Cooler components</text>
    <text x="400" y="692" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#d8f7ff">Lower thermal stress</text>
    <text x="400" y="734" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#d8f7ff">More consistent operation</text>
  </g>

  <g transform="translate(850 250)">
    <rect width="640" height="356" rx="24" fill="url(#panel)" stroke="#37577d"/>
    <text x="38" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#e4f8ff" font-weight="700">MSI MAG A550BN PSU</text>
    <text x="38" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#9fd6eb">550W 80+ Bronze certified power supply for reliable office loads.</text>
    <rect x="40" y="164" width="560" height="148" rx="16" fill="#111a27" stroke="#5a779a"/>
    <text x="70" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#d9f4ff">Steady power for long sessions</text>
    <text x="70" y="274" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#b7dff0">Good baseline for future upgrades</text>
  </g>

  <g transform="translate(850 654)">
    <rect width="640" height="356" rx="24" fill="url(#panel)" stroke="#37577d"/>
    <text x="38" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="40" fill="#e4f8ff" font-weight="700">Ready for Business Use</text>
    <text x="38" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="31" fill="#b7dff0">1. Clean, professional case style for office desks.</text>
    <text x="38" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="31" fill="#b7dff0">2. Airflow-first chassis helps maintain stable performance.</text>
    <text x="38" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="31" fill="#b7dff0">3. Balanced components for dependable daily productivity.</text>
    <text x="38" y="286" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#e6faff" font-weight="700">Designed by BPP PCs for practical workflows.</text>
  </g>
</svg>
