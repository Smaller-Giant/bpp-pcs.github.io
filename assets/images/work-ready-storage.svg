<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Work Ready storage details</title>
  <desc id="desc">Storage and startup-speed benefits for the Work Ready PC.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1c29"/>
      <stop offset="100%" stop-color="#2b5a74"/>
    </linearGradient>
    <clipPath id="textClip">
      <rect x="140" y="380" width="835" height="280" rx="14"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="48" y="42" width="1504" height="816" rx="34" fill="#0c1628" fill-opacity="0.80" stroke="#d9eeff" stroke-opacity="0.22"/>

  <text x="122" y="188" fill="#f4f9ff" font-family="Segoe UI, Arial, sans-serif" font-size="94" font-weight="700" letter-spacing="7">FAST STARTUP</text>
  <text x="122" y="256" fill="#cde9ff" font-family="Segoe UI, Arial, sans-serif" font-size="40" letter-spacing="4">128GB NVME SSD STORAGE</text>

  <rect x="112" y="296" width="852" height="498" rx="24" fill="#102338" stroke="#d9eeff" stroke-opacity="0.18"/>
  <text x="150" y="356" fill="#b7e3ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="2">PART HIGHLIGHTS</text>

  <g clip-path="url(#textClip)">
    <text x="150" y="422" fill="#eef6ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Patriot P300 NVMe SSD for quick boot and login</text>
    <text x="150" y="478" fill="#eef6ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Faster app launch than older hard-drive systems</text>
    <text x="150" y="534" fill="#eef6ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Smooth file access for documents and spreadsheets</text>
    <text x="150" y="590" fill="#eef6ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" letter-spacing="0.35">Snappier day-to-day workflow with less waiting</text>
  </g>

  <g transform="translate(1002 156)">
    <rect x="0" y="0" width="472" height="586" rx="30" fill="#09101e" stroke="#e0f3ff" stroke-opacity="0.24"/>
    <rect x="62" y="138" width="350" height="146" rx="18" fill="#132a44" stroke="#e0f3ff" stroke-opacity="0.28"/>
    <rect x="102" y="176" width="270" height="72" rx="12" fill="#0f2239"/>
    <circle cx="136" cy="212" r="10" fill="#98e0ff"/>
    <rect x="158" y="200" width="192" height="24" rx="10" fill="#8fd9ff" fill-opacity="0.65"/>
    <rect x="92" y="340" width="290" height="108" rx="16" fill="#111d31" stroke="#e0f3ff" stroke-opacity="0.16"/>
  </g>
</svg>
